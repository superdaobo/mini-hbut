name: Sync Website

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "website/**"
      - "scripts/build_website_modules.mjs"
      - "scripts/build_release_manifests.mjs"
      - ".github/workflows/website-modules.yml"
      - ".github/workflows/sync-website.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: website-pages-deploy
  cancel-in-progress: false

jobs:
  sync-website:
    runs-on: ubuntu-latest
    # 跳过 tag 推送触发（tag push 由 release.yml 的 deploy-website 负责）
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    steps:
      - uses: actions/checkout@v5

      - name: Get latest release tag
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="$(gh release view --json tagName -q .tagName 2>/dev/null || true)"
          if [ -z "$TAG" ]; then
            echo "No release found, skip asset download"
            echo "HAS_RELEASE=false" >> "$GITHUB_OUTPUT"
          else
            echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
            echo "HAS_RELEASE=true" >> "$GITHUB_OUTPUT"
            echo "Latest release: $TAG"
          fi

      - name: Restore existing releases from website-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RESTORE_DIR="$(mktemp -d)"
          if git clone --depth=1 --branch website-pages "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$RESTORE_DIR" >/dev/null 2>&1; then
            if [ -d "$RESTORE_DIR/dist/releases" ]; then
              mkdir -p website/public/releases
              cp -a "$RESTORE_DIR/dist/releases/." website/public/releases/
              echo "Restored existing release directories from website-pages"
            else
              echo "website-pages has no dist/releases, skip restore"
            fi
          else
            echo "website-pages branch unavailable, skip restore"
          fi

      - name: Restore existing modules from website-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RESTORE_DIR="$(mktemp -d)"
          if git clone --depth=1 --branch website-pages "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$RESTORE_DIR" >/dev/null 2>&1; then
            if [ -d "$RESTORE_DIR/dist/modules" ]; then
              mkdir -p website/public/modules
              cp -a "$RESTORE_DIR/dist/modules/." website/public/modules/
              echo "Restored existing module directories from website-pages"
            else
              echo "website-pages has no dist/modules, skip restore"
            fi
          else
            echo "website-pages branch unavailable, skip modules restore"
          fi

      - name: Download latest release assets
        if: steps.release.outputs.HAS_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.release.outputs.TAG }}"
          DEST="website/public/releases/${TAG}"
          rm -rf "$DEST"
          mkdir -p "$DEST"
          gh release download "$TAG" --dir "$DEST" --pattern "Mini-HBUT_*" --clobber
          # EdgeOne Pages 单文件限制 25MB，删除超限文件（走 GitHub 代理下载）
          find "$DEST" -size +25M -delete
          echo "Assets for CDN (<=25MB):"
          ls -lh "$DEST"

      - name: Download dev-latest release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view dev-latest --json tagName -q .tagName >/dev/null 2>&1; then
            DEST="website/public/releases/dev-latest"
            rm -rf "$DEST"
            mkdir -p "$DEST"
            gh release download dev-latest --dir "$DEST" --pattern "Mini-HBUT_*" --clobber
            find "$DEST" -size +25M -delete
            echo "Dev assets for CDN (<=25MB):"
            ls -lh "$DEST"
            echo "HAS_DEV=true" >> "$GITHUB_OUTPUT"
          else
            echo "No dev-latest release found, skip"
            echo "HAS_DEV=false" >> "$GITHUB_OUTPUT"
          fi
        id: dev_release

      - name: Generate release manifests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_CHANNEL: main
          STABLE_TAG: ${{ steps.release.outputs.TAG }}
          SOURCE_REF: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          node scripts/build_release_manifests.mjs

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install zip
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Build website modules
        env:
          MODULE_SOURCE_CHANNEL: main
          MODULE_BASE_URL: https://hbut.6661111.xyz/modules
        run: |
          set -euo pipefail
          node scripts/build_website_modules.mjs

      - name: Build website
        run: |
          cd website
          npm ci --prefer-offline --no-audit --no-fund
          npm run build

      - name: Deploy to website-pages branch
        run: |
          set -euo pipefail
          DEPLOY=$(mktemp -d)
          echo '{"name":"mini-hbut-website","private":true,"scripts":{"build":"echo skip"}}' > "$DEPLOY/package.json"
          cp -r website/dist "$DEPLOY/dist"
          cd "$DEPLOY"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: sync website from ${GITHUB_SHA::7}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:website-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
