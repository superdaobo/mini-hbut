name: Lint & Compliance

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  clippy:
    name: Rust Clippy (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Clippy (deny warnings)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings -W clippy::unwrap_used -W clippy::expect_used

  compliance-grep:
    name: Compliance Grep Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SPDX + Attribution headers
        run: |
          FAIL=0
          for f in src-tauri/src/modules/chaoxing_checkin/*.rs; do
            [ -f "$f" ] || continue
            if ! grep -q "SPDX-License-Identifier" "$f"; then
              echo "❌ Missing SPDX header: $f"
              FAIL=1
            fi
          done
          for f in src-tauri/src/modules/chaoxing_checkin/qr_url.rs src-tauri/src/modules/chaoxing_checkin/protocol.rs; do
            [ -f "$f" ] || continue
            if ! grep -q "SPDX-License-Identifier" "$f"; then
              echo "❌ Missing SPDX header: $f"
              FAIL=1
            fi
          done
          if [ $FAIL -ne 0 ]; then exit 1; fi
          echo "✅ SPDX headers present"

      - name: No bare chaoxing.com fetch in frontend
        run: |
          HITS=$(grep -rn "fetch(['\"]https\?://[^'\"]*chaoxing\.com" src/ 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            echo "❌ 前端裸调 chaoxing.com:"
            echo "$HITS"
            exit 1
          fi
          echo "✅ No bare chaoxing.com fetch in frontend"

      - name: No excluded endpoint keywords in chaoxing_checkin module
        run: |
          FAIL=0
          for keyword in record_page homework vote face yuketang; do
            HITS=$(grep -rn "$keyword" src-tauri/src/modules/chaoxing_checkin/ 2>/dev/null || true)
            if [ -n "$HITS" ]; then
              echo "❌ Excluded keyword '$keyword' found:"
              echo "$HITS"
              FAIL=1
            fi
          done
          if [ $FAIL -ne 0 ]; then exit 1; fi
          echo "✅ No excluded endpoint keywords"

      - name: No sensitive fields in console.log
        run: |
          HITS=$(grep -rn "console\.log([^)]*(cookie\|enc\|object_id\|student_id)" src/ 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            echo "❌ console.log 含敏感字段:"
            echo "$HITS"
            exit 1
          fi
          echo "✅ No sensitive fields in console.log"

  capacitor-sync:
    name: Capacitor Sync Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci || yarn install --frozen-lockfile || pnpm install --frozen-lockfile
      - name: Build frontend
        run: npm run build || yarn build || pnpm build
      - name: Capacitor sync
        run: npx cap sync
