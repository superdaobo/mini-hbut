name: Dev Build

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

env:
  MINI_HBUT_BUILD_PROFILE: release
  CARGO_INCREMENTAL: 0
  CARGO_BUILD_JOBS: 8
  CARGO_PROFILE_RELEASE_OPT_LEVEL: z
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1
  CARGO_PROFILE_RELEASE_LTO: fat
  CARGO_PROFILE_RELEASE_DEBUG: 0
  CARGO_PROFILE_RELEASE_PANIC: abort
  CARGO_PROFILE_RELEASE_STRIP: symbols
  npm_config_audit: "false"
  npm_config_fund: "false"

concurrency:
  group: dev-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch source (git fallback to tarball)
        env:
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf source source.tar.gz .git-tmp .tar-tmp
          mkdir -p source

          fetched=0
          for i in 1 2 3 4 5; do
            echo "[source] git fetch attempt ${i}"
            rm -rf .git-tmp
            mkdir -p .git-tmp
            if (
              cd .git-tmp
              git init
              git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"
              git -c protocol.version=2 fetch --depth=1 origin "${GH_SHA}"
              git checkout --detach FETCH_HEAD
            ); then
              fetched=1
              break
            fi
            sleep $((i * 5))
          done

          if [ "${fetched}" -eq 1 ]; then
            echo "[source] git fetch succeeded"
            cp -a .git-tmp/. source/
            rm -rf source/.git
          else
            echo "[source] git fetch failed, fallback to codeload tarball"
            curl -fL --retry 8 --retry-all-errors --retry-delay 3 \
              "https://codeload.github.com/${GH_REPO}/tar.gz/${GH_SHA}" -o source.tar.gz
            mkdir -p .tar-tmp
            tar -xzf source.tar.gz -C .tar-tmp --strip-components=1
            cp -a .tar-tmp/. source/
          fi

          test -f source/package.json
          tar -czf source.tar.gz -C source .

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-tar
          path: source.tar.gz
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  meta:
    needs: source
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      beta_version: ${{ steps.version.outputs.beta_version }}
    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: source-tar
      - name: Extract source
        run: tar -xzf source.tar.gz

      - name: Resolve build version
        id: version
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(python - <<'PY'
          import json
          import os
          import urllib.request

          def parse_core(version: str):
              text = str(version or '').strip().lstrip('v')
              core = text.split('-', 1)[0]
              values = []
              for part in core.split('.'):
                  match = ''.join(ch for ch in part if ch.isdigit())
                  values.append(int(match or '0'))
              return values

          def compare(left: str, right: str) -> int:
              a = parse_core(left)
              b = parse_core(right)
              length = max(len(a), len(b))
              a += [0] * (length - len(a))
              b += [0] * (length - len(b))
              if a > b:
                  return 1
              if a < b:
                  return -1
              return 0

          def fetch_main_version(repo: str, token: str) -> str:
              if not repo:
                  return ''
              url = f'https://raw.githubusercontent.com/{repo}/main/package.json'
              request = urllib.request.Request(
                  url,
                  headers={
                      **({'Authorization': f'Bearer {token}'} if token else {})
                  }
              )
              try:
                  with urllib.request.urlopen(request, timeout=10) as response:
                      payload = json.loads(response.read().decode('utf-8'))
                      return str(payload.get('version', '')).strip()
              except Exception:
                  return ''

          with open('package.json', 'r', encoding='utf-8') as f:
              current_version = str(json.load(f).get('version', '0.0.0')).strip()

          main_version = fetch_main_version(
              os.environ.get('GH_REPO', '').strip(),
              os.environ.get('GH_TOKEN', '').strip()
          )
          base_version = main_version if compare(main_version, current_version) >= 0 else current_version
          print(base_version or current_version or '0.0.0')
          PY
          )"
          BETA_VERSION="${VERSION}-beta.${GITHUB_RUN_ID}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "beta_version=$BETA_VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION"
          echo "BETA_VERSION=$BETA_VERSION"

  smoke-fast-build:
    needs: source
    runs-on: ubuntu-latest
    env:
      MINI_HBUT_BUILD_PROFILE: dev-fast
    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: source-tar
      - name: Extract source
        run: tar -xzf source.tar.gz

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build fast-check web bundle
        run: |
          npm run build
          node scripts/check_dist_boundary.mjs
          node scripts/report_bundle_sizes.mjs

  build-android:
    needs: [source, meta, smoke-fast-build]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: source-tar
      - name: Extract source
        run: tar -xzf source.tar.gz

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        run: |
          sdkmanager "ndk;27.0.11718014"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.11718014" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
          save-if: ${{ github.ref == 'refs/heads/dev' }}

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Initialize Android project
        run: npm run tauri android init

      - name: Sync Android icons
        run: node scripts/sync_tauri_platform_icons.mjs android

      - name: Patch Android notification permissions
        run: |
          set -euo pipefail
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          if [ ! -f "$MANIFEST" ]; then
            echo "AndroidManifest.xml not found: $MANIFEST"
            exit 1
          fi
          python - <<'PY'
          from pathlib import Path
          p = Path("src-tauri/gen/android/app/src/main/AndroidManifest.xml")
          text = p.read_text(encoding="utf-8")
          perms = [
              "android.permission.POST_NOTIFICATIONS",
              "android.permission.WAKE_LOCK",
              "android.permission.FOREGROUND_SERVICE",
              "android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS",
          ]
          for perm in perms:
              marker = f'android:name="{perm}"'
              if marker not in text:
                  text = text.replace(
                      "<application",
                      f'    <uses-permission android:name="{perm}" />\\n\\n    <application',
                      1,
                  )
          p.write_text(text, encoding="utf-8")
          print("Patched AndroidManifest permissions.")
          PY
          grep -n "POST_NOTIFICATIONS\\|WAKE_LOCK\\|FOREGROUND_SERVICE\\|REQUEST_IGNORE_BATTERY_OPTIMIZATIONS" "$MANIFEST"

      - name: Build Android APK (arm64)
        run: npm run tauri android build -- --target aarch64 --apk true
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Report Android raw build size
        env:
          BUNDLE_ROOT: src-tauri/gen/android/app/build/outputs/apk
        run: node scripts/report_bundle_sizes.mjs

      - name: Sign and rename APK
        env:
          BETA_VERSION: ${{ needs.meta.outputs.beta_version }}
        run: |
          set -euo pipefail
          UNSIGNED_APK="$(find src-tauri/gen/android/app/build/outputs/apk -name '*.apk' | head -n 1)"
          if [ -z "$UNSIGNED_APK" ]; then
            echo "No unsigned APK found."
            find src-tauri/gen/android/app/build/outputs -maxdepth 6 -type f -print || true
            exit 1
          fi

          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release-key.jks
          else
            keytool -genkeypair -v \
              -keystore release-key.jks \
              -alias mini-hbut \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Mini-HBUT, OU=HBUT, O=HBUT, L=Wuhan, ST=Hubei, C=CN"
          fi

          "${ANDROID_SDK_ROOT}/build-tools/35.0.0/zipalign" -v -p 4 "$UNSIGNED_APK" app-aligned.apk
          OUT_APK="Mini-HBUT_${BETA_VERSION}_arm64.apk"
          "${ANDROID_SDK_ROOT}/build-tools/35.0.0/apksigner" sign \
            --ks release-key.jks \
            --ks-key-alias mini-hbut \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "$OUT_APK" \
            app-aligned.apk
          "${ANDROID_SDK_ROOT}/build-tools/35.0.0/apksigner" verify -v "$OUT_APK"
          ls -lh "$OUT_APK"

      - name: Report Android package size
        env:
          BUNDLE_ROOT: .
        run: node scripts/report_bundle_sizes.mjs

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ needs.meta.outputs.beta_version }}
          path: Mini-HBUT_${{ needs.meta.outputs.beta_version }}_arm64.apk
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  build-windows:
    needs: [source, meta, smoke-fast-build]
    runs-on: windows-latest
    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: source-tar
      - name: Extract source
        shell: powershell
        run: tar -xzf source.tar.gz

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
          save-if: ${{ github.ref == 'refs/heads/dev' }}

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build Windows app
        run: npm run tauri build -- --bundles nsis,msi

      - name: Report dist and raw Windows bundle size
        run: node scripts/report_bundle_sizes.mjs

      - name: Rename Windows bundles
        shell: powershell
        env:
          BETA_VERSION: ${{ needs.meta.outputs.beta_version }}
        run: |
          New-Item -ItemType Directory -Force -Path dist-dev | Out-Null
          $exe = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $exe) { throw "NSIS EXE not found" }
          Copy-Item $exe.FullName "dist-dev/Mini-HBUT_$env:BETA_VERSION`_x64-setup.exe" -Force

          $msi = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName "dist-dev/Mini-HBUT_$env:BETA_VERSION`_x64_en-US.msi" -Force
          }

          Get-ChildItem dist-dev

      - name: Report packaged Windows size
        env:
          BUNDLE_ROOT: dist-dev
        run: node scripts/report_bundle_sizes.mjs

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ needs.meta.outputs.beta_version }}
          path: dist-dev/*
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  build-macos:
    needs: [source, meta, smoke-fast-build]
    runs-on: macos-latest
    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: source-tar
      - name: Extract source
        run: tar -xzf source.tar.gz

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
          save-if: ${{ github.ref == 'refs/heads/dev' }}

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build macOS app (universal, app only)
        run: npm run tauri build -- --target universal-apple-darwin --bundles app

      - name: Report macOS raw build size
        env:
          BUNDLE_ROOT: src-tauri/target/universal-apple-darwin/release/bundle
        run: node scripts/report_bundle_sizes.mjs

      - name: Package macOS bundle
        env:
          BETA_VERSION: ${{ needs.meta.outputs.beta_version }}
        run: |
          set -euo pipefail
          mkdir -p dist-dev
          APP_PATH="$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -type d -name '*.app' | head -n 1 || true)"
          if [ -z "$APP_PATH" ]; then
            echo "macOS .app not found"
            find src-tauri/target/universal-apple-darwin/release/bundle -maxdepth 4 -type d -print || true
            exit 1
          fi

          ZIP_OUT="dist-dev/Mini-HBUT_${BETA_VERSION}_universal.app.zip"

          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_OUT"
          ls -lh "$ZIP_OUT"

      - name: Report macOS package size
        env:
          BUNDLE_ROOT: dist-dev
        run: node scripts/report_bundle_sizes.mjs

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ needs.meta.outputs.beta_version }}
          path: dist-dev/*
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  build-ios:
    needs: [source, meta, smoke-fast-build]
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: source-tar
      - name: Extract source
        run: tar -xzf source.tar.gz

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
          save-if: ${{ github.ref == 'refs/heads/dev' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build iOS app bundle
        run: |
          set -euo pipefail
          node --input-type=module - <<'NODE'
          import fs from 'node:fs';
          const p = 'src-tauri/tauri.conf.json';
          const conf = JSON.parse(fs.readFileSync(p, 'utf8'));
          conf.build = conf.build || {};
          delete conf.build.devUrl;
          delete conf.build.beforeDevCommand;
          conf.build.beforeBuildCommand = 'npm run build && node scripts/check_dist_boundary.mjs';
          conf.build.frontendDist = conf.build.frontendDist || '../dist';
          fs.writeFileSync(p, JSON.stringify(conf, null, 2) + '\n');
          console.log('Patched tauri.conf.json for iOS CI.');
          NODE

          npm run tauri ios init
          node scripts/sync_tauri_platform_icons.mjs ios
          npm run build
          node scripts/check_dist_boundary.mjs
          node scripts/report_bundle_sizes.mjs

          export TMPDIR="$PWD/.tauri-tmp"
          export NPM_CONFIG_AUDIT=false
          export NPM_CONFIG_FUND=false
          mkdir -p "$TMPDIR"

          npm install ws --no-save --no-audit --no-fund
          node -e "require('ws'); console.log('ws ok')"

          cp tools/ci/tauri-cli-options-server.cjs "$TMPDIR/tauri-cli-options-server.cjs"

          IDENTIFIER="$(node -p "require('./src-tauri/tauri.conf.json').identifier")"
          PORT="$(python -c "import socket; s=socket.socket(); s.bind(('127.0.0.1', 0)); print(s.getsockname()[1]); s.close()")"
          export PORT
          echo "127.0.0.1:$PORT" > "$TMPDIR/${IDENTIFIER}-server-addr"

          LOG="$TMPDIR/tauri-cli-options-server.log"
          TAURI_CLI_OPTIONS_PORT="$PORT" TMPDIR="$TMPDIR" NODE_PATH="$PWD/node_modules" node "$TMPDIR/tauri-cli-options-server.cjs" >"$LOG" 2>&1 &
          OPTIONS_PID=$!
          cleanup() {
            if [ -n "${OPTIONS_PID:-}" ] && kill -0 "$OPTIONS_PID" 2>/dev/null; then
              kill "$OPTIONS_PID"
            fi
          }
          trap cleanup EXIT

          sleep 1
          if ! kill -0 "$OPTIONS_PID" 2>/dev/null; then
            echo "WS server process exited early"
            cat "$LOG"
            exit 1
          fi

          python - <<'PY'
          import os
          import socket
          import sys
          import time

          port = int(os.environ["PORT"])
          for _ in range(60):
              sock = socket.socket()
              sock.settimeout(0.2)
              try:
                  sock.connect(("127.0.0.1", port))
                  sock.close()
                  sys.exit(0)
              except Exception:
                  sock.close()
                  time.sleep(0.2)
          sys.exit(1)
          PY

          mkdir -p src-tauri/target/aarch64-apple-ios/debug
          ln -sf ../release/libhbut_helper_lib.a src-tauri/target/aarch64-apple-ios/debug/libhbut_helper_lib.a

          TMPDIR="$TMPDIR" xcodebuild \
            -workspace src-tauri/gen/apple/hbut-helper.xcodeproj/project.xcworkspace \
            -scheme hbut-helper_iOS \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build-ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package IPA
        env:
          BETA_VERSION: ${{ needs.meta.outputs.beta_version }}
        run: |
          set -euo pipefail
          mkdir -p Payload

          APP_PATH=""
          for PATTERN in "*/Release-iphoneos/*.app" "*/release-iphoneos/*.app" "*/Debug-iphoneos/*.app" "*/debug-iphoneos/*.app"; do
            APP_PATH="$(find build-ios/Build/Products -path "$PATTERN" -type d | head -n 1 || true)"
            if [ -n "$APP_PATH" ]; then
              break
            fi
          done
          if [ -z "$APP_PATH" ]; then
            APP_PATH="$(find build-ios/Build/Products -path "*/iphoneos/*.app" -type d | head -n 1 || true)"
          fi
          if [ -z "$APP_PATH" ]; then
            echo "No iPhoneOS .app found under build-ios/Build/Products"
            find build-ios/Build/Products -maxdepth 6 -type d -print || true
            exit 1
          fi

          APP_BIN="$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist" 2>/dev/null || basename "$APP_PATH" .app)"
          if [ -f "$APP_PATH/$APP_BIN" ]; then
            xcrun strip -x -S "$APP_PATH/$APP_BIN" || true
          fi

          cp -R "$APP_PATH" Payload/
          IPA_NAME="Mini-HBUT_${BETA_VERSION}_iOS.ipa"
          zip -9 -r "$IPA_NAME" Payload
          ls -lh "$IPA_NAME"

      - name: Report iOS package size
        env:
          BUNDLE_ROOT: .
        run: node scripts/report_bundle_sizes.mjs

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-${{ needs.meta.outputs.beta_version }}
          path: Mini-HBUT_${{ needs.meta.outputs.beta_version }}_iOS.ipa
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  build-linux:
    needs: [source, meta, smoke-fast-build]
    runs-on: ubuntu-latest
    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: source-tar
      - name: Extract source
        run: tar -xzf source.tar.gz

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            build-essential

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
          save-if: ${{ github.ref == 'refs/heads/dev' }}

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build Linux app
        run: npm run tauri build -- --bundles appimage

      - name: Report Linux raw build size
        env:
          BUNDLE_ROOT: src-tauri/target/release/bundle
        run: node scripts/report_bundle_sizes.mjs

      - name: Rename Linux bundles
        env:
          BETA_VERSION: ${{ needs.meta.outputs.beta_version }}
        run: |
          set -euo pipefail
          mkdir -p dist-dev
          APPIMAGE="$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' | head -n 1 || true)"
          if [ -z "$APPIMAGE" ]; then
            echo "No Linux bundle found"
            exit 1
          fi

          cp "$APPIMAGE" "dist-dev/Mini-HBUT_${BETA_VERSION}_amd64.AppImage"
          ls -lh dist-dev

      - name: Report Linux package size
        env:
          BUNDLE_ROOT: dist-dev
        run: node scripts/report_bundle_sizes.mjs

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ needs.meta.outputs.beta_version }}
          path: dist-dev/*
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  deploy-dev-release:
    if: ${{ always() }}
    needs: [meta, build-android, build-windows, build-macos, build-ios, build-linux]
    runs-on: ubuntu-latest
    concurrency:
      group: website-pages-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dev-assets
          pattern: "{android,windows,macos,ios,linux}-*"
          merge-multiple: true

      - name: List collected assets
        run: ls -lhR dev-assets

      - name: Recreate dev-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BETA_VERSION: ${{ needs.meta.outputs.beta_version }}
        run: |
          set -euo pipefail
          TAG="dev-latest"

          # 删除旧 release（静默失败）
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          sleep 2

          # 创建新 release（prerelease + 标题含 beta 版本号）
          gh release create "$TAG" \
            --prerelease \
            --title "测试版 ${BETA_VERSION}" \
            --notes "自动构建的测试版本 \`${BETA_VERSION}\`，仅用于开发测试。

          **构建时间**: $(date -u '+%Y-%m-%d %H:%M UTC')
          **Commit**: ${GITHUB_SHA::7}

          > ⚠️ 此版本为自动生成的开发测试版，可能存在未完成的功能或已知问题。" \
            dev-assets/*

          echo "✅ dev-latest release created with ${BETA_VERSION}"

      - name: Restore existing releases from website-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RESTORE_DIR="$(mktemp -d)"
          if git clone --depth=1 --branch website-pages "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$RESTORE_DIR" >/dev/null 2>&1; then
            if [ -d "$RESTORE_DIR/dist/releases" ]; then
              mkdir -p website/public/releases
              cp -a "$RESTORE_DIR/dist/releases/." website/public/releases/
              echo "Restored existing release directories from website-pages"
            else
              echo "website-pages has no dist/releases, skip restore"
            fi
          else
            echo "website-pages branch unavailable, skip restore"
          fi

      - name: Restore existing modules from website-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RESTORE_DIR="$(mktemp -d)"
          if git clone --depth=1 --branch website-pages "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$RESTORE_DIR" >/dev/null 2>&1; then
            if [ -d "$RESTORE_DIR/dist/modules" ]; then
              mkdir -p website/public/modules
              cp -a "$RESTORE_DIR/dist/modules/." website/public/modules/
              echo "Restored existing module directories from website-pages"
            else
              echo "website-pages has no dist/modules, skip restore"
            fi
          else
            echo "website-pages branch unavailable, skip modules restore"
          fi

      - name: Download stable release assets for CDN
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="$(gh release view --json tagName -q .tagName --exclude-pre-releases 2>/dev/null || true)"
          if [ -z "$TAG" ]; then
            echo "No stable release found, skip"
            echo "HAS_STABLE=false" >> "$GITHUB_ENV"
          else
            DEST="website/public/releases/${TAG}"
            rm -rf "$DEST"
            mkdir -p "$DEST"
            gh release download "$TAG" --dir "$DEST" --pattern "Mini-HBUT_*" --clobber
            find "$DEST" -size +25M -delete
            echo "Stable assets (<=25MB):"
            ls -lh "$DEST"
            echo "STABLE_TAG=$TAG" >> "$GITHUB_ENV"
            echo "HAS_STABLE=true" >> "$GITHUB_ENV"
          fi

      - name: Compare beta asset sizes against stable
        if: ${{ env.HAS_STABLE == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BASELINE_DIR="stable-assets"
          mkdir -p "$BASELINE_DIR"
          gh release download "$STABLE_TAG" --dir "$BASELINE_DIR" --pattern "Mini-HBUT_*" --clobber
          BUNDLE_ROOT="dev-assets" BASELINE_DIR="$BASELINE_DIR" node scripts/report_bundle_sizes.mjs

      - name: Copy dev assets for CDN
        run: |
          set -euo pipefail
          LATEST_DEST="website/public/releases/dev-latest"
          rm -rf "$LATEST_DEST"
          mkdir -p "$LATEST_DEST"
          cp dev-assets/* "$LATEST_DEST/"
          find "$LATEST_DEST" -size +25M -delete
          echo "Dev latest assets for CDN (<=25MB):"
          ls -lh "$LATEST_DEST"

      - name: Generate release manifests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_CHANNEL: dev
          STABLE_TAG: ${{ env.STABLE_TAG }}
          BETA_VERSION: ${{ needs.meta.outputs.beta_version }}
          SOURCE_REF: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          node scripts/build_release_manifests.mjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Build website modules (dev channel)
        env:
          MODULE_CHANNEL: dev
          MODULE_BASE_URL: https://hbut.6661111.xyz/modules
          MODULE_VERSION: ${{ needs.meta.outputs.beta_version }}
        run: |
          set -euo pipefail
          node scripts/build_website_modules.mjs

      - name: Build website
        run: |
          cd website
          npm ci --prefer-offline --no-audit --no-fund
          npm run build

      - name: Deploy to website-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BETA_VERSION: ${{ needs.meta.outputs.beta_version }}
        run: |
          set -euo pipefail
          DEPLOY=$(mktemp -d)
          echo '{"name":"mini-hbut-website","private":true,"scripts":{"build":"echo skip"}}' > "$DEPLOY/package.json"
          cp -r website/dist "$DEPLOY/dist"
          cd "$DEPLOY"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: dev-build ${BETA_VERSION}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:website-pages
