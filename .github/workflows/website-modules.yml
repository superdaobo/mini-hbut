name: Website Modules Deploy

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "website/**"
      - "scripts/build_website_modules.mjs"
      - ".github/workflows/website-modules.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-website-modules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve module channel
        id: channel
        run: |
          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            echo "channel=dev" >> "$GITHUB_OUTPUT"
          else
            echo "channel=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore releases/modules from website-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RESTORE_DIR="$(mktemp -d)"
          if git clone --depth=1 --branch website-pages "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$RESTORE_DIR" >/dev/null 2>&1; then
            if [ -d "$RESTORE_DIR/dist/releases" ]; then
              mkdir -p website/public/releases
              cp -a "$RESTORE_DIR/dist/releases/." website/public/releases/
              echo "Restored existing releases from website-pages"
            else
              echo "website-pages has no dist/releases"
            fi
            if [ -d "$RESTORE_DIR/dist/modules" ]; then
              mkdir -p website/public/modules
              cp -a "$RESTORE_DIR/dist/modules/." website/public/modules/
              echo "Restored existing modules from website-pages"
            else
              echo "website-pages has no dist/modules"
            fi
          else
            echo "website-pages branch unavailable, skip restore"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Build website modules
        env:
          MODULE_CHANNEL: ${{ steps.channel.outputs.channel }}
          MODULE_BASE_URL: https://hbut.6661111.xyz/modules
        run: |
          set -euo pipefail
          node scripts/build_website_modules.mjs

      - name: Build website
        run: |
          cd website
          npm ci --prefer-offline --no-audit --no-fund
          npm run build

      - name: Deploy to website-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DEPLOY=$(mktemp -d)
          echo '{"name":"mini-hbut-website","private":true,"scripts":{"build":"echo skip"}}' > "$DEPLOY/package.json"
          cp -r website/dist "$DEPLOY/dist"
          cd "$DEPLOY"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: website modules ${GITHUB_REF_NAME} ${GITHUB_SHA::7}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:website-pages
