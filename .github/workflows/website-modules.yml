name: Website Modules Deploy

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "website/**"
      - "scripts/build_website_modules.mjs"
      - ".github/workflows/website-modules.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-website-modules:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - name: Resolve module channel
        id: channel
        run: |
          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            echo "channel=dev" >> "$GITHUB_OUTPUT"
          else
            echo "channel=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore releases/modules from website-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RESTORE_DIR="$(mktemp -d)"
          if git clone --depth=1 --branch website-pages "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$RESTORE_DIR" >/dev/null 2>&1; then
            if [ -d "$RESTORE_DIR/dist/releases" ]; then
              mkdir -p website/public/releases
              cp -a "$RESTORE_DIR/dist/releases/." website/public/releases/
              echo "Restored existing releases from website-pages"
            else
              echo "website-pages has no dist/releases"
            fi
            if [ -d "$RESTORE_DIR/dist/modules" ]; then
              mkdir -p website/public/modules
              cp -a "$RESTORE_DIR/dist/modules/." website/public/modules/
              echo "Restored existing modules from website-pages"
            else
              echo "website-pages has no dist/modules"
            fi
          else
            echo "website-pages branch unavailable, skip restore"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install zip
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Build website modules
        id: build_modules
        continue-on-error: true
        env:
          MODULE_CHANNEL: ${{ steps.channel.outputs.channel }}
          MODULE_BASE_URL: https://hbut.6661111.xyz/modules
        run: |
          set -euo pipefail
          mkdir -p .ci-logs
          node scripts/build_website_modules.mjs 2>&1 | tee .ci-logs/build-website-modules.log

      - name: Summarize module build log
        if: always()
        run: |
          {
            echo "## Build website modules"
            echo ""
            if [ -f .ci-logs/build-website-modules.log ]; then
              echo '```text'
              tail -n 200 .ci-logs/build-website-modules.log
              echo '```'
            else
              echo "No build log generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload module build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-website-modules-log-${{ github.run_id }}
          path: .ci-logs/build-website-modules.log
          if-no-files-found: ignore

      - name: Fail when module build failed
        if: steps.build_modules.outcome == 'failure'
        run: |
          echo "Website module build failed. See step summary or uploaded artifact."
          exit 1

      - name: Build website
        run: |
          cd website
          npm ci --prefer-offline --no-audit --no-fund
          npm run build

      - name: Deploy to website-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DEPLOY=$(mktemp -d)
          echo '{"name":"mini-hbut-website","private":true,"scripts":{"build":"echo skip"}}' > "$DEPLOY/package.json"
          cp -r website/dist "$DEPLOY/dist"
          cd "$DEPLOY"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: website modules ${GITHUB_REF_NAME} ${GITHUB_SHA::7}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:website-pages
