name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - "**.md"
      - "website/**"
      - "soft-copyright/**"
      - ".github/workflows/dev-build.yml"
      - ".github/workflows/release.yml"
      - ".github/workflows/sync-website.yml"
      - ".github/workflows/website-modules.yml"
      - ".github/workflows/sync-main-to-dev.yml"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Production build smoke
        run: npm run build

      - name: Run Vitest
        run: npm run test:ci

      - name: Frontend safety guards
        run: |
          node scripts/check-frontend-safety.mjs
          node scripts/check-design-tokens.mjs

      - name: Sensitive upload guard (tracked files)
        run: node scripts/guard_sensitive_uploads.mjs pre-commit

      - name: Check dist boundary script
        run: node scripts/check_dist_boundary.mjs

      - name: Vue typecheck (CI subset)
        run: npx vue-tsc --noEmit -p tsconfig.ci.json

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install frontend deps and build dist
        run: |
          npm ci --prefer-offline --no-audit --no-fund
          npm run build

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libpipewire-0.3-dev \
            libgbm-dev \
            build-essential

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target

      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

      - name: Cargo fmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --lib
