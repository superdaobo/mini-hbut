name: 功能建议
description: 提出新功能或改进建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 背景 / 痛点
      description: 你想解决什么问题？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你期望的行为或界面是怎样的？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 是否考虑过其他做法？
