<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="HandheldFriendly" content="true" />
  <title>HBUT 成绩查询</title>
  <!-- 图标字体已改为本地 npm 包，由 main.ts 延迟加载，无 CDN 依赖 -->
  <style>
    @layer reset, legacy, tailwind;

    @layer reset {
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-touch-callout: none;
        -webkit-user-select: text;
        user-select: text;
      }
    }

    html,
    body,
    #app {
      height: 100%;
      font-family: var(--ui-font-family);
      touch-action: manipulation;
      overscroll-behavior: none;
      /* 全局隐藏滚动条 */
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar,
    #app::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }

    /* 禁止双击缩放 */
    html {
      touch-action: manipulation;
    }

    /* 暗色模式下确保整个视口背景为深色 */
    html.dark,
    html.dark body,
    html.dark #app {
      background-color: #0f172a !important;
      background: #0f172a !important;
    }

    /* ══════════════════════════════════════
       原生 HTML Splash（Vue 挂载前显示）
       ══════════════════════════════════════ */
    .native-splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    .native-splash-bg {
      position: absolute;
      inset: 0;
    }
    .native-splash-bg-image {
      position: absolute;
      inset: 0;
      background:
        url('/splash/cas_bg.webp') center/cover no-repeat,
        linear-gradient(145deg, #0f172a 0%, #0f4c81 42%, #1d4ed8 100%);
      animation: _nsBgKen 20s ease-in-out infinite alternate;
    }
    .native-splash-bg-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.25) 0%, transparent 70%),
        radial-gradient(ellipse at 80% 100%, rgba(34,211,238,0.15) 0%, transparent 60%),
        linear-gradient(180deg, rgba(15,23,42,0.15) 0%, rgba(15,23,42,0.35) 100%);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    .native-splash-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .native-splash-particles span {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      left: calc(5% * var(--i));
      top: calc(100% + 10px);
      animation: _nsParticleRise calc(4s + var(--i) * 0.3s) calc(var(--i) * 0.15s) ease-in infinite;
      opacity: 0;
    }
    .native-splash-particles span:nth-child(odd) {
      width: 3px; height: 3px;
      background: rgba(99,102,241,0.6);
    }
    .native-splash-particles span:nth-child(3n) {
      width: 5px; height: 5px;
      background: rgba(34,211,238,0.5);
    }
    .native-splash-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 0 24px;
      width: 100%;
      max-width: 420px;
      animation: _nsFadeSlideIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .native-splash-logo-ring {
      position: relative;
      width: 88px; height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .native-splash-logo-ring::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(from 0deg,
        rgba(99,102,241,0.8),
        rgba(168,85,247,0.6),
        rgba(34,211,238,0.8),
        rgba(99,102,241,0.8));
      animation: _nsRingSpin 3s linear infinite;
      filter: blur(1px);
    }
    .native-splash-logo-ring::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 30px rgba(99,102,241,0.3), 0 0 60px rgba(99,102,241,0.15);
    }
    .native-splash-logo-ring img {
      position: relative;
      z-index: 1;
      width: 56px; height: 56px;
      object-fit: contain;
      animation: _nsLogoPulse 2s ease-in-out infinite;
    }
    .native-splash-title {
      font-size: 28px;
      font-weight: 700;
      color: white;
      letter-spacing: 2px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3), 0 0 40px rgba(99,102,241,0.4);
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .native-splash-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      letter-spacing: 4px;
      text-shadow: 0 1px 8px rgba(0,0,0,0.3);
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .native-splash-building {
      width: min(280px, 70vw);
      max-height: 140px;
      object-fit: contain;
      filter: drop-shadow(0 4px 20px rgba(99,102,241,0.3)) brightness(1.05);
      animation: _nsBuildingFloat 4s ease-in-out infinite;
      opacity: 0;
      animation-delay: 0.4s;
      animation-fill-mode: backwards;
    }
    .native-splash-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      opacity: 0;
      animation: _nsFadeSlideIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.7s both;
    }
    .native-splash-spinner {
      position: relative;
      width: 48px; height: 48px;
    }
    .native-splash-spinner-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2.5px solid transparent;
      border-top-color: rgba(255,255,255,0.9);
      animation: _nsSpinnerSpin 1.2s cubic-bezier(0.5,0,0.5,1) infinite;
    }
    .native-splash-spinner-ring:nth-child(2) {
      inset: 5px;
      border-top-color: rgba(99,102,241,0.8);
      animation-duration: 1.6s;
      animation-direction: reverse;
    }
    .native-splash-spinner-ring:nth-child(3) {
      inset: 10px;
      border-top-color: rgba(34,211,238,0.7);
      animation-duration: 2s;
    }
    .native-splash-spinner-dot {
      position: absolute;
      top: 50%; left: 50%;
      width: 6px; height: 6px;
      margin: -3px 0 0 -3px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 10px rgba(255,255,255,0.6);
      animation: _nsDotPulse 1.2s ease-in-out infinite;
    }
    .native-splash-text {
      font-size: 14px;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 1px 8px rgba(0,0,0,0.3);
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-width: 180px;
      text-align: center;
    }

    @keyframes _nsBgKen {
      0%   { transform: scale(1); }
      100% { transform: scale(1.08); }
    }
    @keyframes _nsRingSpin {
      to { transform: rotate(360deg); }
    }
    @keyframes _nsLogoPulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.05); }
    }
    @keyframes _nsBuildingFloat {
      0%   { opacity: 1; transform: translateY(0); }
      50%  { opacity: 1; transform: translateY(-8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes _nsSpinnerSpin {
      to { transform: rotate(360deg); }
    }
    @keyframes _nsDotPulse {
      0%, 100% { opacity: 0.4; transform: scale(0.8); }
      50%      { opacity: 1;   transform: scale(1.2); }
    }
    @keyframes _nsParticleRise {
      0%   { opacity: 0; transform: translateY(0) scale(0); }
      10%  { opacity: 0.8; transform: translateY(-20px) scale(1); }
      90%  { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(calc(-100vh - 20px)) scale(0.5); }
    }
    @keyframes _nsFadeSlideIn {
      from { opacity: 0; transform: translateY(30px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-height: 580px) {
      .native-splash-building-wrap { display: none; }
      .native-splash-content { gap: 16px; }
      .native-splash-logo-ring { width: 72px; height: 72px; }
      .native-splash-logo-ring img { width: 44px; height: 44px; }
      .native-splash-title { font-size: 24px; }
    }
  </style>
</head>

<body>
  <div id="app">
    <!-- 原生 HTML Splash：Vue 挂载后自动替换 -->
    <div class="native-splash" id="native-splash">
      <div class="native-splash-bg">
        <div class="native-splash-bg-image"></div>
        <div class="native-splash-bg-overlay"></div>
        <div class="native-splash-particles">
          <span style="--i:1"></span><span style="--i:2"></span><span style="--i:3"></span>
          <span style="--i:4"></span><span style="--i:5"></span><span style="--i:6"></span>
          <span style="--i:7"></span><span style="--i:8"></span><span style="--i:9"></span>
          <span style="--i:10"></span><span style="--i:11"></span><span style="--i:12"></span>
          <span style="--i:13"></span><span style="--i:14"></span><span style="--i:15"></span>
          <span style="--i:16"></span><span style="--i:17"></span><span style="--i:18"></span>
          <span style="--i:19"></span><span style="--i:20"></span>
        </div>
      </div>
      <div class="native-splash-content">
        <div class="native-splash-logo-ring">
          <img src="/splash/app_icon.png" alt="Mini-HBUT" />
        </div>
        <h1 class="native-splash-title">Mini-HBUT</h1>
        <p class="native-splash-subtitle">湖北工业大学智慧校园助手</p>
        <div class="native-splash-building-wrap">
          <img src="/splash/cas_building.png" alt="" class="native-splash-building" />
        </div>
        <div class="native-splash-loader">
          <div class="native-splash-spinner">
            <div class="native-splash-spinner-ring"></div>
            <div class="native-splash-spinner-ring"></div>
            <div class="native-splash-spinner-ring"></div>
            <div class="native-splash-spinner-dot"></div>
          </div>
          <p class="native-splash-text">正在启动…</p>
        </div>
      </div>
    </div>
  </div>
  <script type="module" charset="utf-8" src="/src/main.ts"></script>
</body>

</html>
