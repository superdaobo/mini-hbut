<style>
        body {
            background-color: #f6fafe;
            -webkit-tap-highlight-color: transparent;
        }

<body class="antialiased text-on-surface w-full max-w-[448px] mx-auto min-h-screen relative flex flex-col bg-background font-body-md">
<!-- TopAppBar (Customized for Sub-page context) -->
<header class="bg-background/80 backdrop-blur-md flex justify-between items-center px-container-padding h-16 w-full z-50 sticky top-0">
<div class="flex items-center gap-2">
<button class="p-2 -ml-2 text-on-surface hover:bg-surface-container-low rounded-full transition-colors scale-95 active:opacity-80 transition-all">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface">🏫 空教室</h1>
</div>
<div>
<!-- Empty trailing for alignment -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col gap-stack-gap pb-24">
<!-- Filter Section -->
<section class="px-container-padding flex flex-col gap-3">
<!-- Quick Time Selection (Bento-style chips) -->
<div class="grid grid-cols-3 gap-2">
<button class="bg-primary-container text-on-primary-container font-label-md text-label-md py-2.5 rounded-lg border border-transparent shadow-[0_4px_15px_rgba(33,112,228,0.15)] transition-transform active:scale-95 flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="wb_sunny">wb_sunny</span>
                    上午
                </button>
<button class="bg-surface-container-lowest text-on-surface-variant font-label-md text-label-md py-2.5 rounded-lg border border-outline-variant/30 shadow-[0_4px_15px_rgba(0,0,0,0.03)] transition-transform active:scale-95 flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="routine">routine</span>
                    下午
                </button>
<button class="bg-surface-container-lowest text-on-surface-variant font-label-md text-label-md py-2.5 rounded-lg border border-outline-variant/30 shadow-[0_4px_15px_rgba(0,0,0,0.03)] transition-transform active:scale-95 flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="bedtime">bedtime</span>
                    晚上
                </button>
</div>
<!-- Detailed Filters (Horizontal Scroll) -->
<div class="flex flex-col gap-3 bg-surface-container-lowest p-4 rounded-[24px] shadow-[0_4px_15px_rgba(0,0,0,0.03)] mt-2">
<!-- Building -->
<div class="flex items-center">
<span class="text-secondary font-label-md text-label-md w-12 shrink-0">楼栋</span>
<div class="flex overflow-x-auto no-scrollbar gap-2 pb-1">
<button class="px-3 py-1.5 rounded-full bg-surface-container-highest text-on-surface font-label-md text-label-md shrink-0">全部</button>
<button class="px-3 py-1.5 rounded-full bg-primary/10 text-primary font-label-md text-label-md border border-primary/20 shrink-0">主楼</button>
<button class="px-3 py-1.5 rounded-full bg-surface-container-lowest border border-outline-variant/50 text-on-surface-variant font-label-md text-label-md shrink-0">教一</button>
<button class="px-3 py-1.5 rounded-full bg-surface-container-lowest border border-outline-variant/50 text-on-surface-variant font-label-md text-label-md shrink-0">教二</button>
<button class="px-3 py-1.5 rounded-full bg-surface-container-lowest border border-outline-variant/50 text-on-surface-variant font-label-md text-label-md shrink-0">教三</button>
</div>
</div>
<!-- Week -->
<div class="flex items-center">
<span class="text-secondary font-label-md text-label-md w-12 shrink-0">周次</span>
<div class="flex overflow-x-auto no-scrollbar gap-2 pb-1">
<button class="px-3 py-1.5 rounded-full bg-primary/10 text-primary font-label-md text-label-md border border-primary/20 shrink-0">本周(第8周)</button>
<button class="px-3 py-1.5 rounded-full bg-surface-container-lowest border border-outline-variant/50 text-on-surface-variant font-label-md text-label-md shrink-0">第9周</button>

<button class="px-3 py-1.5 rounded-full bg-surface-container-lowest border border-outline-variant/50 text-on-surface-variant font-label-md text-label-md shrink-0">第11周</button>
</div>
</div>

<span class="text-secondary font-label-md text-label-md w-12 shrink-0">星期</span>

<button class="px-3 py-1.5 rounded-full bg-primary/10 text-primary font-label-md text-label-md border border-primary/20 shrink-0">周一(今天)</button>
<button class="px-3 py-1.5 rounded-full bg-surface-container-lowest border border-outline-variant/50 text-on-surface-variant font-label-md text-label-md shrink-0">周二</button>
<button class="px-3 py-1.5 rounded-full bg-surface-container-lowest border border-outline-variant/50 text-on-surface-variant font-label-md text-label-md shrink-0">周三</button>
<button class="px-3 py-1.5 rounded-full bg-surface-container-lowest border border-outline-variant/50 text-on-surface-variant font-label-md text-label-md shrink-0">周四</button>
<button class="px-3 py-1.5 rounded-full bg-surface-container-lowest border border-outline-variant/50 text-on-surface-variant font-label-md text-label-md shrink-0">周五</button>

</div>

<span class="material-symbols-outlined text-[14px]" data-icon="check" data-weight="fill">check</span>
                            1-2节
                        </button>
<button class="px-3 py-1.5 rounded-full bg-primary/10 text-primary font-label-md text-label-md border border-primary/20 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]" data-icon="check" data-weight="fill">check</span>
                            3-4节

<button class="px-3 py-1.5 rounded-full bg-surface-container-lowest border border-outline-variant/50 text-on-surface-variant font-label-md text-label-md">5-6节</button>
<button class="px-3 py-1.5 rounded-full bg-surface-container-lowest border border-outline-variant/50 text-on-surface-variant font-label-md text-label-md">7-8节</button>
<button class="px-3 py-1.5 rounded-full bg-surface-container-lowest border border-outline-variant/50 text-on-surface-variant font-label-md text-label-md">9-10节</button>

<div class="flex justify-between items-start">
<div class="flex flex-col">
<h3 class="font-headline-sm text-headline-sm text-on-surface flex items-center gap-2">

</h3>

<div class="flex flex-col items-end">

</div>
<div class="flex gap-2 mt-2">

<span class="material-symbols-outlined text-[14px]" data-icon="ac_unit">ac_unit</span>

</div>

<div class="bg-surface-container-lowest rounded-[24px] p-5 shadow-[0_4px_15px_rgba(0,0,0,0.03)] border border-outline-variant/10 flex flex-col gap-3 relative overflow-hidden">
<div class="absolute top-0 right-0 w-24 h-24 bg-gradient-to-bl from-success-teal/10 to-transparent rounded-bl-full pointer-events-none"></div>
<div class="flex justify-between items-start">
<div class="flex flex-col">
<h3 class="font-headline-sm text-headline-sm text-on-surface flex items-center gap-2">
                            主楼 301

</h3>
<span class="text-secondary font-body-md text-body-md mt-1">阶梯教室</span>
</div>
<div class="flex flex-col items-end">

<div class="bg-surface-container-lowest rounded-[24px] p-5 shadow-[0_4px_15px_rgba(0,0,0,0.03)] border border-outline-variant/10 flex flex-col gap-3 relative overflow-hidden opacity-80">
<div class="absolute top-0 right-0 w-24 h-24 bg-gradient-to-bl from-warning-orange/10 to-transparent rounded-bl-full pointer-events-none"></div>
<div class="flex justify-between items-start">
<div class="flex flex-col">
<h3 class="font-headline-sm text-headline-sm text-on-surface flex items-center gap-2">
                            主楼 405
                            <span class="px-2 py-0.5 rounded-md bg-warning-orange/10 text-warning-orange font-label-sm text-label-sm">下节有课</span>
</h3>
<span class="text-secondary font-body-md text-body-md mt-1">普通教室</span>
</div>
<div class="flex flex-col items-end">
<span class="text-primary font-headline-md text-headline-md">60</span>
<span class="text-on-surface-variant font-label-sm text-label-sm">座位数</span>
</div>
</div>
<div class="bg-surface p-2 rounded-lg mt-1 border border-surface-variant">
<p class="font-label-md text-label-md text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]" data-icon="schedule">schedule</span>

</div>
</div>

<div class="py-6 flex flex-col items-center justify-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined animate-spin" data-icon="autorenew">autorenew</span>
<span class="font-label-md text-label-md">正在加载更多教室...</span>
</div>
</section>
