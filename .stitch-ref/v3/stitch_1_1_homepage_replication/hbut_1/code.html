<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>电费查询 - HBUT 校园助手</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#f6fafe",
                        "outline": "#727785",
                        "inverse-primary": "#adc6ff",

                        "success-teal": "#14b8a6",
                        "surface-tint": "#005ac2",
                        "surface-container": "#eaeef2",
                        "on-tertiary-fixed": "#311400",
                        "on-surface-variant": "#424754",
                        "outline-variant": "#c2c6d6",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#004395",
                        "surface-variant": "#dfe3e7",
                        "secondary": "#585f6c",
                        "accent-gradient-start": "#5b86e5",
                        "on-surface": "#171c1f",
                        "on-error-container": "#93000a",
                        "primary": "#0058be",
                        "inverse-surface": "#2c3134",
                        "on-background": "#171c1f",
                        "warning-orange": "#f97316",
                        "primary-fixed-dim": "#adc6ff",
                        "on-tertiary-fixed-variant": "#723600",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#d8e2ff",
                        "surface-container-low": "#f0f4f8",
                        "danger-red": "#ef4444",
                        "on-secondary-fixed": "#151c27",
                        "info-sky": "#38bdf8",
                        "secondary-fixed-dim": "#c0c7d6",
                        "surface-dim": "#d6dade",
                        "tertiary-fixed-dim": "#ffb786",
                        "tertiary-container": "#b75b00",
                        "secondary-fixed": "#dce2f3",
                        "on-secondary-fixed-variant": "#404754",
                        "primary-container": "#2170e4",
                        "on-primary-container": "#fefcff",

                        "surface-container-lowest": "#ffffff",

                        "on-tertiary": "#ffffff",

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding": "1rem",

                    "fontFamily": {

                }
            }
        }

<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }
        .glass-card-warning {
            background: linear-gradient(135deg, rgba(255, 218, 214, 0.9) 0%, rgba(255, 255, 255, 0.9) 100%);
            border: 1px solid rgba(255, 218, 214, 0.5);
            box-shadow: 0 10px 20px rgba(186, 26, 26, 0.1);
        }
        .glass-card-info {
            background: linear-gradient(135deg, rgba(216, 226, 255, 0.9) 0%, rgba(255, 255, 255, 0.9) 100%);
            border: 1px solid rgba(216, 226, 255, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md max-w-[448px] mx-auto relative overflow-x-hidden">
<!-- TopAppBar (Transactional/Sub-page, modified for Back action) -->
<header class="bg-background/80 backdrop-blur-md text-primary font-title-md text-title-md docked full-width top-0 sticky flat no shadows flex justify-between items-center px-container-padding h-16 w-full z-50">
<button class="text-on-surface-variant hover:bg-surface-container-low transition-colors rounded-full p-2 flex items-center justify-center scale-95 active:opacity-80 transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="font-headline-sm text-on-surface flex items-center gap-1">
<span class="material-symbols-outlined text-warning-orange" style="font-variation-settings: 'FILL' 1;">bolt</span>
            电费查询
        </div>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 px-container-padding pb-[100px] flex flex-col gap-stack-gap mt-4">
<!-- Offline Data Banner -->
<div class="bg-surface-container-high rounded-lg p-3 flex items-start gap-3">
<span class="material-symbols-outlined text-secondary mt-0.5" style="font-variation-settings: 'FILL' 0;">cloud_off</span>
<div>
<p class="font-body-md text-on-surface-variant text-body-md">当前显示为离线缓存数据</p>
<p class="font-label-md text-outline text-label-md mt-1">最后更新: 2023-10-25 08:30</p>
</div>
</div>
<!-- 4-Level Cascade Selector Card -->
<section class="glass-card rounded-2xl p-5">
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 0;">apartment</span>
                宿舍信息
            </h2>
<div class="grid grid-cols-2 gap-3">
<!-- Campus -->
<div class="relative">
<label class="block font-label-sm text-label-sm text-outline mb-1 pl-1">校区</label>
<div class="bg-surface-container-low rounded-xl px-3 py-2.5 flex items-center justify-between border border-transparent focus-within:border-primary transition-colors">
<span class="font-body-md text-body-md text-on-surface">南湖校区</span>
<span class="material-symbols-outlined text-outline text-sm" style="font-variation-settings: 'FILL' 0;">expand_more</span>
</div>
</div>
<!-- Building -->
<div class="relative">
<label class="block font-label-sm text-label-sm text-outline mb-1 pl-1">楼栋</label>
<div class="bg-surface-container-low rounded-xl px-3 py-2.5 flex items-center justify-between border border-transparent focus-within:border-primary transition-colors">
<span class="font-body-md text-body-md text-on-surface">北区13栋</span>
<span class="material-symbols-outlined text-outline text-sm" style="font-variation-settings: 'FILL' 0;">expand_more</span>
</div>
</div>
<!-- Floor -->
<div class="relative">
<label class="block font-label-sm text-label-sm text-outline mb-1 pl-1">楼层</label>
<div class="bg-surface-container-low rounded-xl px-3 py-2.5 flex items-center justify-between border border-transparent focus-within:border-primary transition-colors">
<span class="font-body-md text-body-md text-on-surface">3层</span>
<span class="material-symbols-outlined text-outline text-sm" style="font-variation-settings: 'FILL' 0;">expand_more</span>
</div>
</div>
<!-- Room -->
<div class="relative">
<label class="block font-label-sm text-label-sm text-outline mb-1 pl-1">房间</label>
<div class="bg-surface-container-low rounded-xl px-3 py-2.5 flex items-center justify-between border border-transparent focus-within:border-primary transition-colors">
<span class="font-body-md text-body-md text-on-surface">314</span>
<span class="material-symbols-outlined text-outline text-sm" style="font-variation-settings: 'FILL' 0;">expand_more</span>
</div>
</div>
</div>
</section>
<!-- Lighting Billing Card (Low Balance Warning) -->
<section class="glass-card-warning rounded-2xl p-5 relative overflow-hidden">
<div class="absolute -right-4 -top-4 opacity-10">
<span class="material-symbols-outlined text-9xl text-error" style="font-variation-settings: 'FILL' 1;">lightbulb</span>
</div>
<div class="flex justify-between items-start mb-4 relative z-10">
<div class="flex items-center gap-2">
<div class="bg-error-container text-error rounded-full p-2 flex items-center justify-center">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">lightbulb</span>
</div>
<h3 class="font-headline-sm text-headline-sm text-on-surface">照明用电</h3>
</div>
<div class="bg-error/10 text-error font-label-sm text-label-sm px-2 py-1 rounded-md flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">warning</span>
                    余额不足
                </div>
</div>
<div class="grid grid-cols-2 gap-4 relative z-10">
<div>
<p class="font-label-md text-label-md text-on-surface-variant mb-1">剩余电量 (度)</p>
<p class="font-headline-lg text-headline-lg text-error">5.24</p>
</div>
<div>
<p class="font-label-md text-label-md text-on-surface-variant mb-1">剩余金额 (元)</p>
<p class="font-headline-md text-headline-md text-on-surface mt-1">¥ 2.88</p>
</div>
</div>
<div class="mt-5 flex gap-3 relative z-10">
<button class="flex-1 bg-primary text-on-primary font-body-lg text-body-lg py-3 rounded-full flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-md shadow-primary/20">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
                    立即充值
                </button>
<button class="bg-surface-container-lowest text-primary border border-primary/20 rounded-full w-12 h-12 flex items-center justify-center active:scale-95 transition-transform shadow-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">refresh</span>
</button>
</div>
</section>
<!-- AC Billing Card (Normal) -->
<section class="glass-card-info rounded-2xl p-5 relative overflow-hidden">
<div class="absolute -right-4 -top-4 opacity-5">
<span class="material-symbols-outlined text-9xl text-info-sky" style="font-variation-settings: 'FILL' 1;">ac_unit</span>
</div>
<div class="flex justify-between items-start mb-4 relative z-10">
<div class="flex items-center gap-2">
<div class="bg-primary-container/20 text-primary rounded-full p-2 flex items-center justify-center">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">ac_unit</span>
</div>
<h3 class="font-headline-sm text-headline-sm text-on-surface">空调用电</h3>
</div>
<div class="bg-success-teal/10 text-success-teal font-label-sm text-label-sm px-2 py-1 rounded-md flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                    运行正常
                </div>
</div>
<div class="grid grid-cols-2 gap-4 relative z-10">
<div>
<p class="font-label-md text-label-md text-on-surface-variant mb-1">剩余电量 (度)</p>
<p class="font-headline-lg text-headline-lg text-primary">128.50</p>
</div>
<div>
<p class="font-label-md text-label-md text-on-surface-variant mb-1">剩余金额 (元)</p>
<p class="font-headline-md text-headline-md text-on-surface mt-1">¥ 70.68</p>
</div>
</div>
<div class="mt-5 flex gap-3 relative z-10">
<button class="flex-1 bg-primary-container/10 text-primary font-body-lg text-body-lg py-3 rounded-full flex items-center justify-center gap-2 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
                    去充值
                </button>
<button class="bg-surface-container-lowest text-primary border border-primary/20 rounded-full w-12 h-12 flex items-center justify-center active:scale-95 transition-transform shadow-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">refresh</span>
</button>
</div>
</section>
</main>
<!-- Bottom Nav Suppressed (Task-focused transactional sub-page with a Back button) -->
</body></html>
