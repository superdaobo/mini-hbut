<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Mini-HBUT 演示</title>
  <style>
    html, body, #app {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #f0f4f8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    /* 演示入口跳过重型原生 Splash，仅极短占位 */
    .demo-boot {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: rgba(255, 255, 255, 0.75);
      font-size: 13px;
      letter-spacing: 0.04em;
    }
  </style>
  <script type="module" crossorigin src="./assets/app-demo-CxKBY5JQ.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/vue-core-DdLVj9yW.js">
  <link rel="modulepreload" crossorigin href="./assets/more-modules-CsUTdMqs.js">
  <link rel="modulepreload" crossorigin href="./assets/runtime-bridge-apFQ0nCw.js">
  <link rel="modulepreload" crossorigin href="./assets/capture-DZL0crXj.js">
  <link rel="modulepreload" crossorigin href="./assets/debug-tools-CObt9e11.js">
  <link rel="stylesheet" crossorigin href="./assets/app-demo-Bt-an6_m.css">
</head>
<body>
  <div id="app">
    <div class="demo-boot" id="native-splash">正在加载演示…</div>
  </div>
  <script>
    (function () {
      var removed = false
      function removeNativeSplash(reason) {
        if (removed) return
        var el = document.getElementById('native-splash')
        if (!el) { removed = true; return }
        removed = true
        try {
          el.style.transition = 'opacity 0.2s ease'
          el.style.opacity = '0'
          setTimeout(function () {
            if (el && el.parentNode) el.parentNode.removeChild(el)
          }, 220)
        } catch (e) {
          try { el.remove() } catch (_) {}
        }
      }
      setTimeout(function () { removeNativeSplash('timeout-1.5s') }, 1500)
      setTimeout(function () { removeNativeSplash('timeout-4s') }, 4000)
      window.__removeNativeSplash = removeNativeSplash
    })()
  </script>
</body>
</html>
